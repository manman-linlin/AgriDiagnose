<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriDiagnose — 农作物病虫害智能诊断系统</title>

  <!-- ═══════════ 错误诊断脚本 ═══════════ -->
  <!-- 捕获三类错误来源：同步脚本错误 / Promise 未捕获 rejection / Vue 内部 errorHandler（Vue 默认只 console.error 不会抛到 window.onerror）-->
  <script>
    window.__errors = [];
    window.__pushError = function(entry) {
      window.__errors.push(entry);
      var el = document.getElementById('js-errors');
      if (!el) return;
      el.style.display = 'block';
      el.innerHTML = '<strong style="color:red;padding:4px;">JS Errors:</strong>' +
        window.__errors.map(function(e){return '<p style="color:red;margin:4px;font-size:13px;white-space:pre-wrap;">❌ '+e+'</p>';}).join('');
    };
    window.onerror = function(msg, url, line, col, err) {
      var entry = (url||'').replace(/.*\//,'') + ':' + line + ' — ' + msg + (err && err.stack ? '\n' + err.stack : '');
      window.__pushError(entry);
      return false;
    };
    window.addEventListener('unhandledrejection', function(ev) {
      var reason = ev.reason;
      window.__pushError('[Promise Rejection] ' + (reason && reason.stack ? reason.stack : reason));
    });
  </script>

  <!-- ═══════════ 第三方依赖（零构建 ESM importmap） ═══════════ -->
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.prod.js",
        "pinia": "https://unpkg.com/pinia@3/dist/pinia.esm-browser.js",
        "@vue/devtools-api": "https://unpkg.com/@vue/devtools-api@6/lib/esm/index.js"
      }
    }
  </script>

  <!-- ═══════════ CSS（variables 必须最先加载） ═══════════ -->
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>

<div id="js-errors" style="position:fixed;top:0;left:0;right:0;background:#fff3e0;z-index:9999;border-bottom:2px solid red;display:none;max-height:40vh;overflow:auto;"></div>

<!-- Vue 挂载点：class="has-bottom-nav" 让 .page-container 在手机端为底部导航预留空间 -->
<div id="app" class="has-bottom-nav"></div>

<!-- ═══════════ 应用入口（ES Module） ═══════════ -->
<script type="module" src="/static/js/app/main.js"></script>

</body>
</html>
