<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌾 AgriDiagnose — 农作物病虫害智能诊断系统</title>

  <!-- ═══════════ 错误诊断脚本 ═══════════ -->
  <script>
    window.__errors = [];
    window.onerror = function(msg, url, line, col, err) {
      var entry = (url||'').replace(/.*\//,'') + ':' + line + ' — ' + msg;
      window.__errors.push(entry);
      var el = document.getElementById('js-errors');
      if (el) el.innerHTML = window.__errors.map(function(e){return '<p style="color:red;margin:4px;font-size:13px;">❌ '+e+'</p>';}).join('');
      return false;
    };
  </script>

  <!-- ═══════════ 第三方 CDN ═══════════ -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

  <!-- ═══════════ CSS（variables 必须最先加载） ═══════════ -->
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>

<!-- 浮动装饰层 — 3D 光斑/叶片/流动渐变 blob -->
<div class="decor-orbs" aria-hidden="true">
  <div class="decor-orb-center"></div>
</div>

<div id="js-errors" style="position:fixed;top:0;left:0;right:0;background:#fff3e0;z-index:9999;border-bottom:2px solid red;display:none;"></div>
<script>if(window.__errors&&window.__errors.length){var e=document.getElementById('js-errors');e.style.display='block';e.innerHTML='<strong style="color:red">JS Errors:</strong>'+window.__errors.map(function(x){return'<div>'+x+'</div>';}).join('');}</script>

<div id="app">
  <!-- Toast 通知 -->
  <div v-if="toast.visible" class="toast" :class="toast.type">{{ toast.message }}</div>

  <!-- ═══ 顶部固定栏（玻璃拟态） ═══ -->
  <header class="topbar">
    <!-- 汉堡按钮（平板/手机端） -->
    <button class="hamburger-btn" @click="toggleSidebar" :class="{ open: sidebarOpen }">☰</button>

    <!-- Logo + 系统名 -->
    <div class="topbar-logo">
      <span class="logo-icon">🌾</span>
      <span class="logo-text">AgriDiagnose</span>
    </div>

    <!-- 面包屑 -->
    <nav class="topbar-breadcrumb">
      <span class="breadcrumb-item current">{{ currentTitle }}</span>
    </nav>

    <!-- 右侧用户区 -->
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="user-avatar">G</div>
        <span class="user-name">游客</span>
      </div>
    </div>
  </header>

  <!-- 侧边栏 -->
  <app-sidebar
    :current-page="page"
    :pages="pages"
    :model-ready="system.modelReady"
    :open="sidebarOpen"
    @navigate="navigate"
  ></app-sidebar>

  <!-- 侧边栏遮罩（手机端） -->
  <div class="sidebar-overlay" :class="{ open: sidebarOpen }" @click="closeSidebar"></div>

  <!-- 主内容区（唯一可滚动区域） -->
  <main class="main-content">
    <div class="page-container">
      <!-- 动态页面切换（带过渡动画） -->
      <Transition name="page" mode="out-in">
        <component :is="'page-' + page" :key="page"></component>
      </Transition>
    </div>
  </main>
</div>

<!-- ═══════════ JS 基础设施 ═══════════ -->
<script src="/static/js/router.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/store.js"></script>

<!-- ═══════════ UI 组件 ═══════════ -->
<script src="/static/js/components/app-loading.js"></script>
<script src="/static/js/components/app-empty.js"></script>
<script src="/static/js/components/app-error.js"></script>
<script src="/static/js/components/app-conf-bar.js"></script>
<script src="/static/js/components/app-top3-list.js"></script>
<script src="/static/js/components/app-advice-card.js"></script>
<script src="/static/js/components/app-result-card.js"></script>
<script src="/static/js/components/app-image-uploader.js"></script>
<script src="/static/js/components/app-sidebar.js"></script>
<script src="/static/js/components/app-counter.js"></script>
<script src="/static/js/components/app-scroll-reveal.js"></script>

<!-- ═══════════ 页面组件 ═══════════ -->
<script src="/static/js/pages/page-diagnose.js"></script>
<script src="/static/js/pages/page-chat.js"></script>
<script src="/static/js/pages/page-contribute.js"></script>
<script src="/static/js/pages/page-encyclopedia.js"></script>
<script src="/static/js/pages/page-history.js"></script>

<!-- ═══════════ 应用入口 ═══════════ -->
<script src="/static/js/app.js"></script>

</body>
</html>
